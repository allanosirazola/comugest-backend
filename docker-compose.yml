services:
  postgres:
    image: postgres:16-alpine
    container_name: comugest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: comugest
      POSTGRES_PASSWORD: comugest
      POSTGRES_DB: comugest
    ports:
      - "5432:5432"
    volumes:
      - comugest_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comugest"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  comugest_pg_data:
